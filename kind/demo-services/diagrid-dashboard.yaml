apiVersion: v1
kind: ConfigMap
metadata:
  name: dashboard-statestore
  namespace: catalyst-order-workflow-demo
data:
  statestore.yaml: |
    apiVersion: dapr.io/v1alpha1
    kind: Component
    metadata:
      name: inventory-store
      namespace: catalyst-order-workflow-demo
    spec:
      type: state.redis
      version: v1
      metadata:
      - name: redisHost
        value: redis-master.default.svc.cluster.local:6379
      - name: redisPassword
        value: ""
      - name: actorStateStore
        value: "false"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: diagrid-dashboard
  namespace: catalyst-order-workflow-demo
  labels:
    app: diagrid-dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: diagrid-dashboard
  template:
    metadata:
      labels:
        app: diagrid-dashboard
    spec:
      containers:
        - name: diagrid-dashboard
          image: ghcr.io/diagridio/diagrid-dashboard:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: COMPONENT_FILE
              value: /app/components/statestore.yaml
          volumeMounts:
            - name: statestore
              mountPath: /app/components
              readOnly: true
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: statestore
          configMap:
            name: dashboard-statestore
---
apiVersion: v1
kind: Service
metadata:
  name: diagrid-dashboard
  namespace: catalyst-order-workflow-demo
  labels:
    app: diagrid-dashboard
spec:
  selector:
    app: diagrid-dashboard
  ports:
    - name: http
      port: 80
      targetPort: 8080
      nodePort: 30081
      protocol: TCP
  type: NodePort
